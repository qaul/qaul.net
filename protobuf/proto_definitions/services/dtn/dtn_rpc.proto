syntax = "proto3";
package qaul.rpc.dtn;

// DTN service RPC message container
message DTN {
    // message type
    oneof message {
        // dtn state request
        DtnStateRequest dtn_state_request = 1;
        // dtn state response
        DtnStateResponse dtn_state_response = 2;
        // dtn config request
        DtnConfigRequest dtn_config_request = 3;
        // dtn config response
        DtnConfigResponse dtn_config_response = 4;
        // dtn add user request
        DtnAddUserRequest dtn_add_user_request = 5;
        // dtn add user response
        DtnAddUserResponse dtn_add_user_response = 6;
        // dtn remove user request
        DtnRemoveUserRequest dtn_remove_user_request = 7;
        // dtn remove user response
        DtnRemoveUserResponse dtn_remove_user_response = 8;
        // dtn set total size request
        DtnSetTotalSizeRequest dtn_set_total_size_request = 9;
        // dtn set total size response
        DtnSetTotalSizeResponse dtn_set_total_size_response = 10;
        // dtn send routed request
        DtnSendRoutedRequest dtn_send_routed_request = 11;
        // dtn send routed response
        DtnSendRoutedResponse dtn_send_routed_response = 12;
        // dtn set custody enabled request
        DtnSetCustodyEnabledRequest dtn_set_custody_enabled_request = 13;
        // dtn set custody enabled response
        DtnSetCustodyEnabledResponse dtn_set_custody_enabled_response = 14;
        // dtn set sender route request
        DtnSetSenderRouteRequest dtn_set_sender_route_request = 15;
        // dtn set sender route response
        DtnSetSenderRouteResponse dtn_set_sender_route_response = 16;
        // dtn sender routes request
        DtnSenderRoutesRequest dtn_sender_routes_request = 17;
        // dtn sender routes response
        DtnSenderRoutesResponse dtn_sender_routes_response = 18;
        // dtn remove sender route request
        DtnRemoveSenderRouteRequest dtn_remove_sender_route_request = 19;
        // dtn remove sender route response
        DtnRemoveSenderRouteResponse dtn_remove_sender_route_response = 20;
    }
}

// Dtn State Request
message DtnStateRequest {}

// Dtn State Response
message DtnStateResponse {
    // used size
    uint64 used_size = 1;
    // dtn message count
    uint32 dtn_message_count = 2;
    // unconfirmed count
    uint32 unconfirmed_count = 3;
    // used size of V2 custody storage (bytes)
    uint64 used_size_v2 = 4;
    // stored V2 custody message count
    uint32 dtn_message_count_v2 = 5;
}

// Dtn Config Request
message DtnConfigRequest {}

// Dtn Config Response
message DtnConfigResponse {
    // total_size
    uint32 total_size = 1;
    // users
    repeated bytes users = 2;
}

// Dtn Add User Request
message DtnAddUserRequest {
    // user id
    bytes user_id = 1;
}

// Dtn Add User Response
message DtnAddUserResponse {
    // total_size
    bool status = 1;
    // users
    string message = 2;
}

// Dtn Remove User Request
message DtnRemoveUserRequest {
    // user id
    bytes user_id = 1;
}

// Dtn Remove User Response
message DtnRemoveUserResponse {
    // total_size
    bool status = 1;
    // users
    string message = 2;
}

// Dtn SetTotalSize Request
message DtnSetTotalSizeRequest {
    // total_size
    uint32 total_size = 1;
}

// Dtn Remove User Response
message DtnSetTotalSizeResponse {
    // total_size
    bool status = 1;
    // users
    string message = 2;
}

// Request to send a DTN source routed message
// A single hop in a custody route (RPC form).
//
// Mirror of the wire `RouteHop`: IDs sharing a `hop` number are
// interchangeable alternatives at that stage of the route.
message DtnRouteHop {
    // hop / priority number (>= 1, lower = earlier)
    uint32 hop = 1;
    // custodian user IDs at this hop (interchangeable alternatives)
    repeated bytes ids = 2;
}

message DtnSendRoutedRequest {
    // the receiver user ID
    bytes receiver_id = 1;
    // the message data to send (signed Container bytes)
    bytes data = 2;
    // custody route as hop-numbered entries
    repeated DtnRouteHop custody_route = 3;
    // how many seconds until the message expires (0 = no expiry)
    uint64 expiry_seconds = 4;
    // maximum number of custody handoffs allowed
    uint32 max_handoffs = 5;
}

// Response to a directed custody routed DTN send request
message DtnSendRoutedResponse {
    // whether the request was accepted
    bool status = 1;
    // error or status message
    string message = 2;
}

// Request to enable or disable DTN V2 custody acceptance
message DtnSetCustodyEnabledRequest {
    // whether to enable custody acceptance
    bool enabled = 1;
}

// Response to custody enable/disable request
message DtnSetCustodyEnabledResponse {
    // whether the request was successful
    bool status = 1;
    // error or status message
    string message = 2;
}

// Store a sender-defined hop-numbered custody route for a receiver.
//
// Used by DtnSendRoutedRequest when no explicit custody_route is given,
// and takes precedence over the receiver's published preferred route.
message DtnSetSenderRouteRequest {
    // receiver user id (38 byte PeerID)
    bytes receiver_id = 1;
    // hop-numbered custody route
    repeated DtnRouteHop custody_route = 2;
}

// Response to DtnSetSenderRouteRequest
message DtnSetSenderRouteResponse {
    bool status = 1;
    string message = 2;
}

// Request the list of stored sender routes
message DtnSenderRoutesRequest {}

// A single stored sender route
message DtnSenderRoute {
    // receiver user id
    bytes receiver_id = 1;
    // hop-numbered custody route
    repeated DtnRouteHop custody_route = 2;
    // when the route was stored (ms since epoch)
    uint64 created_at = 3;
}

// Response with all stored sender routes
message DtnSenderRoutesResponse {
    repeated DtnSenderRoute routes = 1;
}

// Remove the stored sender route for a receiver
message DtnRemoveSenderRouteRequest {
    bytes receiver_id = 1;
}

// Response to DtnRemoveSenderRouteRequest
message DtnRemoveSenderRouteResponse {
    bool status = 1;
    string message = 2;
}
