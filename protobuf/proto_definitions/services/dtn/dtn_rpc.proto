syntax = "proto3";
package qaul.rpc.dtn;

// DTN service RPC message container
message DTN {
    // message type
    oneof message {
        // dtn state request
        DtnStateRequest dtn_state_request = 1;
        // dtn state response
        DtnStateResponse dtn_state_response = 2;
        // dtn config request
        DtnConfigRequest dtn_config_request = 3;
        // dtn config response
        DtnConfigResponse dtn_config_response = 4;
        // dtn add user request
        DtnAddUserRequest dtn_add_user_request = 5;
        // dtn add user response
        DtnAddUserResponse dtn_add_user_response = 6;
        // dtn remove user request
        DtnRemoveUserRequest dtn_remove_user_request = 7;
        // dtn remove user response
        DtnRemoveUserResponse dtn_remove_user_response = 8;
        // dtn set total size request
        DtnSetTotalSizeRequest dtn_set_total_size_request = 9;
        // dtn set total size response
        DtnSetTotalSizeResponse dtn_set_total_size_response = 10;
        // dtn send routed request
        DtnSendRoutedRequest dtn_send_routed_request = 11;
        // dtn send routed response
        DtnSendRoutedResponse dtn_send_routed_response = 12;
    }
}

// Dtn State Request
message DtnStateRequest {}

// Dtn State Response
message DtnStateResponse {
    // used size
    uint64 used_size = 1;
    // dtn message count
    uint32 dtn_message_count = 2;
    // unconfirmed count
    uint32 unconfirmed_count = 3;
}

// Dtn Config Request
message DtnConfigRequest {}

// Dtn Config Response
message DtnConfigResponse {
    // total_size
    uint32 total_size = 1;
    // users
    repeated bytes users = 2;
}

// Dtn Add User Request
message DtnAddUserRequest {
    // user id
    bytes user_id = 1;
}

// Dtn Add User Response
message DtnAddUserResponse {
    // total_size
    bool status = 1;
    // users
    string message = 2;
}

// Dtn Remove User Request
message DtnRemoveUserRequest {
    // user id
    bytes user_id = 1;
}

// Dtn Remove User Response
message DtnRemoveUserResponse {
    // total_size
    bool status = 1;
    // users
    string message = 2;
}

// Dtn SetTotalSize Request
message DtnSetTotalSizeRequest {
    // total_size
    uint32 total_size = 1;
}

// Dtn Remove User Response
message DtnSetTotalSizeResponse {
    // total_size
    bool status = 1;
    // users
    string message = 2;
}

// Custody route configuration for a single route
message DtnCustodyRouteConfig {
    // ordered list of custodian user IDs
    repeated bytes custody_users = 1;
}

// Request to send a directed custody routed DTN message
message DtnSendRoutedRequest {
    // the receiver user ID
    bytes receiver_id = 1;
    // the message data to send
    bytes data = 2;
    // one or more custody routes
    repeated DtnCustodyRouteConfig routes = 3;
    // how many seconds until the message expires (0 = no expiry)
    uint64 expiry_seconds = 4;
    // maximum number of custody handoffs allowed
    uint32 max_handoffs = 5;
}

// Response to a directed custody routed DTN send request
message DtnSendRoutedResponse {
    // whether the request was accepted
    bool status = 1;
    // error or status message
    string message = 2;
}
