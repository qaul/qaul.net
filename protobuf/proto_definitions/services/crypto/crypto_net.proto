syntax = "proto3";
package qaul.net.crypto;

// Cryptoservice sending container
message CryptoserviceContainer {
    oneof message {
        // Second Handshake Message
        SecondHandshake second_handshake = 1;
        // An additional encrypted payload sent under the partial-
        // handshake CipherState, before the responder has completed
        // KK step 2. See the proposal at
        // docs/proposals/Handshake-Extras-During-Session-Creation.md.
        HandshakeExtraPayload handshake_extra = 2;
        // First rotation handshake (initiator -> responder), encrypted
        // under the currently-primary session.
        RotateHandshakeFirst rotate_first = 3;
        // Second rotation handshake (responder -> initiator), encrypted
        // under the currently-primary session.
        RotateHandshakeSecond rotate_second = 4;
    }
}

// Second Handshake Message
message SecondHandshake {
    // confirm message ID of first handshake message
    bytes signature = 1;
    // received at timestamp
    uint64 received_at = 2;
}

// Encrypted chat payload queued by the initiator while the responder
// is still offline / has not yet sent KK step 2.
//
// Encrypted under a CipherState derived from `HandshakeState::split()`
// applied to the chaining key after msg 1; both sides reach the same
// `ck` after msg 1 so the responder can decrypt. The post-msg-2 split
// produces a different key pair, so transport messages and extras
// never share a cipher.
message HandshakeExtraPayload {
    // Session id of the in-flight first handshake; binds this frame
    // to a specific KK negotiation. Required because the initiator
    // may have re-handshaken with a fresh session_id (e.g. after a
    // limit was hit) and an old extra must not be decrypted under a
    // newer session's keys.
    uint32 session_id = 1;
    // Strictly increasing per session on the initiator side; serves
    // as the AEAD nonce for the pre-completion CipherState. The
    // responder rejects duplicates and tolerates gaps via a bitmap.
    uint64 pre_index = 2;
    // AEAD ciphertext.
    bytes ciphertext = 3;
    // Wall-clock ms at the moment the initiator built this frame.
    // Lets the responder bound how long an orphan (an extra arriving
    // before its msg 1) may sit in the orphan buffer.
    uint64 created_at = 4;
}

// First rotation handshake message.
//
// Sent by the initiator under the currently-primary session once a
// rotation trigger fires. Carries the fresh session_id and the new
// Noise ephemeral public key that the new KK session will use.
message RotateHandshakeFirst {
    // The session id the initiator has chosen for the new session.
    // Collisions between simultaneous rotations are resolved by
    // "lower new_session_id wins".
    uint32 new_session_id = 1;
    // Initiator's fresh Noise ephemeral public key for the new session.
    bytes noise_e = 2;
    // Anti-replay nonce binding this rotation to a specific challenge.
    bytes nonce = 3;
    // Initiator's local timestamp (ms).
    uint64 initiated_at = 4;
}

// Second rotation handshake message.
//
// Sent by the responder under the currently-primary session once a
// valid RotateHandshakeFirst arrives. Completes the KK step 2 under
// the rotated session_id.
message RotateHandshakeSecond {
    // Echoed from RotateHandshakeFirst.new_session_id; ties the
    // response to a specific initiation.
    uint32 new_session_id = 1;
    // Responder's fresh Noise ephemeral public key for the new session.
    bytes noise_e = 2;
    // Echoed from RotateHandshakeFirst.nonce.
    bytes nonce = 3;
    // Responder's local timestamp (ms).
    uint64 received_at = 4;
}
