syntax = "proto3";
package qaul.net.crypto;

// Cryptoservice sending container
message CryptoserviceContainer {
    oneof message {
        // Second Handshake Message
        SecondHandshake second_handshake = 1;
        // An additional encrypted payload sent under the partial-
        // handshake CipherState, before the responder has completed
        // KK step 2. See the proposal at
        // docs/proposals/Handshake-Extras-During-Session-Creation.md.
        HandshakeExtraPayload handshake_extra = 2;
        // First rotation handshake (initiator -> responder), encrypted
        // under the currently-primary session.
        RotateHandshakeFirst rotate_first = 3;
        // Second rotation handshake (responder -> initiator), encrypted
        // under the currently-primary session.
        RotateHandshakeSecond rotate_second = 4;
        // Third rotation handshake (initiator -> responder), the
        // cut-over ACK. Declares the initiator's final A->B nonce on
        // the old session so the responder can drain it by nonce.
        RotateHandshakeFinal rotate_final = 5;
        // Group-file envelope: distributes a per-file symmetric key to
        // one group member under the existing per-peer session. See
        // docs/proposals/Efficient-Group-File-Encryption.md.
        FileKeyEnvelope file_key_envelope = 6;
        // Request from a (late-joining) member to be sent the file key
        // for a file whose body it already has / can fetch.
        FileKeyRelayRequest file_key_relay_request = 7;
    }
}

// Second Handshake Message
message SecondHandshake {
    // confirm message ID of first handshake message
    bytes signature = 1;
    // received at timestamp
    uint64 received_at = 2;
}

// Encrypted chat payload queued by the initiator while the responder
// is still offline / has not yet sent KK step 2.
//
// Encrypted under a CipherState derived from `HandshakeState::split()`
// applied to the chaining key after msg 1; both sides reach the same
// `ck` after msg 1 so the responder can decrypt. The post-msg-2 split
// produces a different key pair, so transport messages and extras
// never share a cipher.
message HandshakeExtraPayload {
    // Session id of the in-flight first handshake; binds this frame
    // to a specific KK negotiation. Required because the initiator
    // may have re-handshaken with a fresh session_id (e.g. after a
    // limit was hit) and an old extra must not be decrypted under a
    // newer session's keys.
    uint32 session_id = 1;
    // Strictly increasing per session on the initiator side; serves
    // as the AEAD nonce for the pre-completion CipherState. The
    // responder rejects duplicates and tolerates gaps via a bitmap.
    uint64 pre_index = 2;
    // AEAD ciphertext.
    bytes ciphertext = 3;
    // Wall-clock ms at the moment the initiator built this frame.
    // Lets the responder bound how long an orphan (an extra arriving
    // before its msg 1) may sit in the orphan buffer.
    uint64 created_at = 4;
}

// First rotation handshake message.
//
// Sent by the initiator under the currently-primary session once a
// rotation trigger fires. Carries the fresh session_id and the new
// Noise ephemeral public key that the new KK session will use.
message RotateHandshakeFirst {
    // The session id the initiator has chosen for the new session.
    // Collisions between simultaneous rotations are resolved by
    // "lower PeerId wins" (a fixed, symmetric tie-break that neither
    // side's random session-id generation can influence).
    uint32 new_session_id = 1;
    // Initiator's fresh Noise ephemeral public key for the new session.
    bytes noise_e = 2;
    // Anti-replay nonce binding this rotation to a specific challenge.
    bytes nonce = 3;
    // Initiator's local timestamp (ms). Display/diagnostics only — no
    // protocol decision depends on it (rotation is clock-free).
    uint64 initiated_at = 4;
}

// Second rotation handshake message.
//
// Sent by the responder under the currently-primary session once a
// valid RotateHandshakeFirst arrives. Completes the KK step 2 under
// the rotated session_id and declares the responder's cut-over point
// for the B->A direction.
message RotateHandshakeSecond {
    // Echoed from RotateHandshakeFirst.new_session_id; ties the
    // response to a specific initiation.
    uint32 new_session_id = 1;
    // Responder's fresh Noise ephemeral public key for the new session.
    bytes noise_e = 2;
    // Echoed from RotateHandshakeFirst.nonce.
    bytes nonce = 3;
    // The responder's last nonce on the old session in the B->A
    // direction (the nonce this very frame is sent with). The
    // initiator drains the old session's inbound side until its
    // highest received nonce reaches this value. Replaces the old
    // wall-clock grace deadline.
    uint64 final_nonce_out = 4;
    // Responder's local timestamp (ms). Display/diagnostics only.
    uint64 received_at = 5;
}

// Third rotation handshake message — the cut-over ACK.
//
// Sent by the initiator (-> responder) once it has finalised the new
// session and cut over its own A->B traffic. Declares the initiator's
// final A->B nonce on the old session so the responder can drain it
// by nonce. Sent under the new (now primary) session.
message RotateHandshakeFinal {
    // Echoed new_session_id, ties this ACK to the rotation.
    uint32 new_session_id = 1;
    // Echoed anti-replay nonce from RotateHandshakeFirst.
    bytes nonce = 2;
    // The initiator's last nonce on the old session in the A->B
    // direction (the nonce this frame is sent with on the old
    // session, before cut-over completes). The responder drains the
    // old session's inbound side until its highest received nonce
    // reaches this value.
    uint64 final_nonce_out = 3;
}

// Per-file content key, delivered to each current group member under
// that member's per-peer Noise session (so it inherits session PFS).
// The file body itself is encrypted once under `file_key` and
// distributed separately; `body_digest` binds this envelope to exactly
// that body.
message FileKeyEnvelope {
    // The file this key decrypts (matches FileHistory / FileHeader id).
    uint64 file_id = 1;
    // The group the file belongs to.
    bytes group_id = 2;
    // 32-byte ChaCha20-Poly1305 content key for the file body.
    bytes file_key = 3;
    // SHA-256 of the encrypted body; must match the distributed body
    // before the receiver decrypts (prevents envelope/body mismatch).
    bytes body_digest = 4;
    // Sender's local timestamp (ms). Display/diagnostics only.
    uint64 sent_at = 5;
    // libp2p PeerId bytes of the sender.
    bytes sender_id = 6;
}

// Ask a peer (a current member that holds the key) to relay the file
// key for `file_id` — used by members who joined after the original
// send. Answered with a FileKeyEnvelope under the requester's session,
// gated by GroupFiles.allow_key_relay and rate-limited.
message FileKeyRelayRequest {
    uint64 file_id = 1;
    bytes group_id = 2;
}
