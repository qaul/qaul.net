[project]
name = "qaul-integration-tests"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pytest>=7.0",
]

[tool.pytest.ini_options]
testpaths = ["."]
markers = [
    "correctness: basic node startup and discovery tests",
    "routing: routing protocol behavior tests",
    "network: network behavior tests (direct messages, feed, degraded links)",
]
